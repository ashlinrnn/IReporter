name: IReporter Backend CI/CD

on: 
  push: 
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test: 
    runs-on: ubuntu-latest
      
    steps:
      #------check code-------
      - name: Checkout Code
        uses: actions/checkout@v4

      #-------set up py enviroment
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      
      #----cache dependencies for speed----
      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{runner.os}}-pip-${{hashFiles('requirements.txt') }}
          restore-keys: |
            ${{runner.os}}-pip-
      
      #------install project dependencies----
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      #------run test using pytest------
      - name: Run test with pytest
        env:
          #flask use test db
          # DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ireporter_test
          SECRET_KEY: ${{secrets.SECRET_KEY || 'test-secret-key'}}
        run: |
          pytest --maxfail=1 --disable-warnings -v
  
  #DEPLOY WHEN TEST PASS
  deploy: 
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name=='push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Deploy backend on Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{secrets.RENDER_DEPLOY_HOOK_URL}}
        run: | 
          curl -X POST "$RENDER_DEPLOY_HOOK_URL"
